apiVersion: v1
kind: Namespace
metadata:
  name: vti-shop-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: vti-shop-db
  labels:
    app: mysql
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          # image sclorg: jalan dengan UID acak OpenShift (SCC restricted), tanpa perlu anyuid
          image: registry.redhat.io/rhel9/mysql-80:latest
          env:
            - name: MYSQL_USER
              value: shop
            - name: MYSQL_PASSWORD
              value: shopPass123   # DEMO ONLY — samakan dengan secret mysql-credentials
            - name: MYSQL_DATABASE
              value: virtusshop
          ports:
            - name: mysql
              containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql/data
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
