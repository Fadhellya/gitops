# Data ownership ditegakkan di level network:
# MySQL hanya boleh diakses product-api — frontend, order-api, dan pod lain ditolak.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: vti-shop-db
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-mysql-from-product-api
  namespace: vti-shop-db
spec:
  podSelector:
    matchLabels:
      app: mysql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vti-shop-apps
          podSelector:
            matchLabels:
              app: product-api
      ports:
        - protocol: TCP
          port: 3306
