# Service menunjuk ke VM MySQL (OCP Virtualization).
# Template VM harus memberi label app=mysql pada spec.template.metadata.labels
# agar pod virt-launcher terseleksi oleh Service ini.
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: virtus-shop-db
  labels:
    app: mysql
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
