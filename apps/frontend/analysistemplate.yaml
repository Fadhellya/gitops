# Canary analysis: success-rate canary dari metrik Istio (istio_requests_total)
# via Thanos Querier. Token SA canary-analysis (cluster-monitoring-view) dari secret.
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: vti-shop-apps
spec:
  args:
    - name: service
    - name: token
      valueFrom:
        secretKeyRef:
          name: thanos-token
          key: token
  metrics:
    - name: success-rate
      interval: 30s
      initialDelay: 30s
      # 2x pengukuran gagal berturut-turut (~1 menit) => rollout di-abort otomatis
      failureLimit: 2
      successCondition: len(result) == 0 || isNaN(result[0]) || result[0] >= 0.95
      provider:
        prometheus:
          address: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
          insecure: true
          headers:
            - key: Authorization
              value: "Bearer {{args.token}}"
          query: >-
            sum(rate(istio_requests_total{reporter="destination",destination_service_name="{{args.service}}",namespace="vti-shop-apps",response_code=~"2.."}[2m]))
            /
            sum(rate(istio_requests_total{reporter="destination",destination_service_name="{{args.service}}",namespace="vti-shop-apps"}[2m]))
