# Dua Service (stable/canary) — Argo Rollouts mengelola selector pod-template-hash
apiVersion: v1
kind: Service
metadata:
  name: frontend-stable
  namespace: vti-shop-apps
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 9898
      targetPort: 9898
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-canary
  namespace: vti-shop-apps
  labels:
    app: frontend
spec:
  selector:
    app: frontend
  ports:
    - name: http
      port: 9898
      targetPort: 9898
