apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api
  namespace: vti-shop-apps
  labels:
    app: product-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-api
  template:
    metadata:
      labels:
        app: product-api
        sidecar.istio.io/inject: "true"
      annotations:
        # app butuh DB saat startup — tahan app sampai sidecar siap (hindari race)
        proxy.istio.io/config: '{ "holdApplicationUntilProxyStarts": true }'
    spec:
      containers:
        - name: product-api
          image: product-api-image
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: mysql-credentials
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              memory: 128Mi
